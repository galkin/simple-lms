id: 4-kak-zadavat-rezultat
slug: 4-kak-zadavat-rezultat
order: 4
title: "Как задавать результат: качества вывода и шаги процесса"

whyItMatters: |
  Один из самых частых источников слабых ответов — не отсутствие деталей, а их неправильный тип. Ты описываешь, как должна выглядеть история, но не говоришь, как к ней прийти. Или наоборот — даёшь шаги, но не объясняешь, что считается хорошим итогом. Понимание разницы между двумя типами инструкций резко улучшает управляемость результата.

theory: |
  ## Два способа направить LLM

  Когда ты пишешь промпт, ты можешь направлять модель двумя принципиально разными способами.

  ### Тип 1: Описание качеств вывода

  Ты перечисляешь, **каким должен быть результат**: его характеристики, ограничения, обязательные элементы.

  Пример задачи — написать короткий рассказ:

  ```
  Напиши короткий рассказ о персонаже, который открывает в себе скрытый талант.

  Требования к результату:
  1. Объём — не более 1000 слов
  2. В тексте должен быть момент, который явно показывает талант
  3. Должен быть хотя бы один второстепенный персонаж
  ```

  Модель получает свободу в выборе подхода, но обязана попасть в описанные параметры финального текста.

  ### Тип 2: Описание шагов процесса

  Ты описываешь **последовательность действий**, которые должна пройти модель перед выдачей результата.

  Тот же запрос, но через шаги:

  ```
  Напиши короткий рассказ о персонаже, который открывает в себе скрытый талант.

  Следуй этим шагам:
  1. Придумай 3 таланта, которые создадут драматическое напряжение
  2. Выбери самый интересный из них
  3. Опиши ключевую сцену, в которой этот талант раскрывается
  4. Придумай 3 типа второстепенных персонажей, которые усилят момент открытия
  ```

  Здесь ты управляешь не финальным текстом, а ходом мышления модели. Результат становится управляемым через процесс.

  ## В чём разница на практике

  | | Качества вывода | Шаги процесса |
  |---|---|---|
  | Что контролируешь | Как выглядит финальный результат | Как модель к нему идёт |
  | Когда удобнее | Когда важен формат и структура итога | Когда важна логика и полнота рассуждений |
  | Риск | Модель может прийти к нужному результату плохим путём | Модель может чётко пройти шаги, но результат не тот формат |

  ## Комбинация: самый сильный вариант

  Оба типа можно и нужно совмещать. Тогда ты управляешь и процессом, и финальным видом:

  ```
  Напиши короткий рассказ о персонаже, который открывает в себе скрытый талант.

  Шаги (как думай):
  1. Придумай 3 таланта, которые создадут драматическое напряжение
  2. Выбери самый интересный
  3. Опиши ключевую сцену раскрытия таланта
  4. Придумай второстепенных персонажей, которые усилят этот момент

  Требования к результату:
  - Объём — не более 1000 слов
  - Ключевой момент с талантом должен быть явным
  - Минимум один второстепенный персонаж
  ```

  Шаги дают модели структуру мышления. Требования к выводу — критерии готовности.

practice: |
  ## Задание: написать промпт тремя способами

  Цель: на одной задаче почувствовать разницу между двумя типами инструкций и их комбинацией.

  Возьми любую задачу из своей работы с ненулевой сложностью. Примеры:
  - написать описание нового продукта для сайта;
  - составить повестку встречи по заданной теме;
  - подготовить обратную связь по черновику текста.

  ### Шаг 1. Промпт через качества вывода

  Напиши промпт, в котором только описываешь требования к результату:
  формат, длина, обязательные элементы, что нельзя делать.

  Отправь в Gemini. Сохрани результат.

  ### Шаг 2. Промпт через шаги процесса

  Напиши промпт для той же задачи, но теперь опиши только шаги, которые должна пройти модель на пути к ответу.

  Отправь в новом чате. Сохрани результат.

  ### Шаг 3. Комбинированный промпт

  Объедини оба подхода: пошаговый процесс + явные требования к финальному результату.

  Отправь в новом чате. Сохрани результат.

  ### Шаг 4. Сравни три ответа

  - Какой вариант дал самый управляемый результат?
  - Что потерялось в промпте только с качествами вывода?
  - Что потерялось в промпте только с шагами?
  - Как изменился результат в комбинированном варианте?

  ## Как понять, что всё получилось

  - У тебя есть три промпта и три ответа по одной задаче.
  - Ты видишь конкретный пример, когда добавление шагов улучшило логику, а добавление требований улучшило формат.
  - Ты знаешь, какой тип инструкции использовать в зависимости от характера задачи.

questions:

- id: q1
  prompt: |
    Что контролирует тип инструкций "качества вывода"?
  options:
    - "Логику рассуждений модели"
    - "Характеристики и параметры финального результата"
    - "Количество итераций в чате"
    - "Скорость генерации ответа"
  correctAnswer: 1

- id: q2
  prompt: |
    Когда особенно полезно описывать шаги процесса?
  options:
    - "Когда важны только длина и формат ответа"
    - "Когда задача простая и однозначная"
    - "Когда важно управлять логикой и полнотой рассуждений модели"
    - "Когда не знаешь, чего хочешь на выходе"
  correctAnswer: 2

- id: q3
  prompt: |
    В чём преимущество комбинации обоих типов инструкций?
  options:
    - "Промпт становится короче"
    - "Ты управляешь и ходом мышления модели, и тем, как выглядит итоговый результат"
    - "Модель работает быстрее"
    - "Ты можешь не проверять результат"
  correctAnswer: 1

additionalInfo: |
  Хорошее правило для сложных задач: начни с вопроса "что мне важнее — формат итога или логика пути к нему?" Это помогает быстро выбрать точку входа.

  Чаще всего:
  - **Только качества вывода** — хорошо работают для коротких, хорошо знакомых форматов: письмо, пост, заголовок.
  - **Только шаги** — хорошо работают для аналитики, генерации идей и многошаговых задач.
  - **Комбинация** — оптимальна для сложных или важных задач, где цена ошибки выше.
