id: 1-znakomstvo-s-gemini
slug: 1-znakomstvo-s-gemini
order: 1
title: "Знакомство с Gemini"

whyItMatters: |
  Gemini — это слово, которое легко запутывает пользователя, потому что им называют и модель, и приложение, и инструменты для разработчиков, и функции внутри других продуктов, а для старта важно просто понять, что чаще всего тебе нужен обычный интерфейс Gemini, где можно писать запросы и получать ответы.

theory: |

  ## Что вообще такое Gemini

  Если совсем по-простому, Gemini — это семейство технологий вокруг искусственного интеллекта от Google.

  Но слово **Gemini** может значить разные вещи в зависимости от ситуации:

  * **Gemini как модель** — большая языковая модель (LLM), то есть система, которая понимает текст, пишет ответы, объясняет, суммирует и помогает думать.
  * **Gemini как приложение** — сайт или интерфейс, куда обычный человек заходит, пишет вопрос и получает ответ.
  * **Gemini как API** — способ для разработчиков подключить возможности Gemini в свои программы.
  * **Gemini как встроенная функция** — когда возможности Gemini появляются внутри других продуктов, например в Google Docs или других приложениях.

  ## Что важно запомнить пользователю

  На старте не надо держать в голове всю экосистему.

  Для первого шага достаточно такой простой мысли: **Gemini чаще всего для пользователя — это приложение, в котором можно общаться с ИИ**.
practice: |
  ## Задание

  Твоя задача — просто открыть Gemini и отправить туда первый запрос.

  1. Открой приложение Gemini от Google в браузере.
  2. Найди поле, куда можно вводить текст.
  3. Вставь или напиши такой запрос:
    "Как раньше назывался продукт Gemini?"
  4. Отправь запрос.
  5. Прочитай ответ и обрати внимание не только на сам факт, но и на то, как Gemini формулирует объяснение.
questions:

- id: q1
  prompt: |
