id: 3-prompty-osnovy
slug: 3-prompty-osnovy
order: 3
title: "Промпты: как формулировать задачу для LLM"

whyItMatters: |
  Большинство слабых ответов от LLM — это не проблема модели, а проблема запроса. Хороший промпт работает как хорошее техническое задание: он снимает неоднозначность, задает формат и дает модели нужный контекст. Эти навыки переносимы между разными LLM и инструментами.

theory: |
  ## Промпт — это не вопрос, это задание

  Когда ты пишешь в LLM короткий вопрос, модель заполняет пропуски сама. Иногда это работает. Чаще — теряется формат, стиль, длина или контекст.

  Хороший промпт — это явное задание, где ты сам убрал неоднозначность.

  ## Шесть базовых техник

  ### 1. Давай контекст

  Объясни, *что* нужно, *зачем* это нужно и какой фон важен для задачи.

  Слабо: "Напиши письмо клиенту."
  Сильнее: "Мы SaaS-компания, клиент написал, что не может войти в аккаунт. Напиши вежливый ответ с просьбой уточнить версию браузера и приложить скриншот ошибки."

  ### 2. Показывай примеры

  Если нужен определенный стиль или формат — покажи его. Модель ориентируется на образец.

  Пример: "Вот как мы обычно пишем анонсы: [пример]. Напиши в том же стиле анонс нового вебинара."

  ### 3. Задавай ограничения

  Формат, длина, тон, что нельзя включать — всё это снижает вариативность ответа.

  Пример: "Объём — 120-150 слов. Без эмодзи. Деловой тон. Без перечислений, только связный текст."

  ### 4. Дроби сложные задачи на шаги

  Если задача многошаговая, веди модель пошагово — не давай всё сразу в виде одного вопроса.

  Пример:
  - Шаг 1: "Перечисли ключевые риски в этом плане."
  - Шаг 2: "Для каждого риска предложи 1-2 варианта митигации."
  - Шаг 3: "Составь финальную таблицу: риск — вероятность — действие."

  ### 5. Дай модели подумать сначала

  Попроси сначала разобрать задачу, и только потом дать ответ.

  Пример: "Прежде чем отвечать, перечисли все ограничения задачи. Затем реши её пошагово."

  ### 6. Задай роль или тон

  Укажи, *как* модель должна отвечать — как эксперт, как редактор, как коллега с опытом.

  Пример: "Ты опытный юрист, специализирующийся на трудовом праве. Объясни этот пункт договора простым языком."

  ## Секретное оружие: попроси модель улучшить твой промпт

  Если промпт получился слабым или задача сложная — попроси модель помочь его переформулировать:

  "Вот мой промпт: [текст]. Что в нём неточно? Как его улучшить, чтобы получить более гарантированный результат?"

  Это работает потому, что модель видит типичные слабые места запросов и может указать на пропуски в контексте, ограничениях или формате.

  ## Промптинг — итерационный процесс

  Первый ответ почти всегда — черновик, а не финал.
  Норма: сформулировал -> получил ответ -> уточнил или улучшил промпт -> повторил.
  Хорошая практика: если не получается с третьей итерации, попроси модель самостоятельно предложить улучшенный вариант твоего запроса.

practice: |
  ## Задание: LLM как оптимизатор промпта

  Цель: написать слабый рабочий промпт под реальную задачу, а потом попросить LLM его улучшить и проверить, есть ли разница в результате.

  1. Выбери задачу из своей работы, для которой ты иногда используешь LLM.
     Примеры: написать вакансию, составить план встречи, объяснить сложную идею коллеге, написать письмо партнеру.

  2. Напиши **первый вариант промпта** коротко и без деталей.
     Например: "Напиши описание вакансии для маркетолога."

  3. Отправь этот промпт в Gemini. Сохрани ответ.

  4. Теперь отправь в том же чате (или в новом) запрос-оптимизатор:
     "Вот мой промпт: [твой промпт]. Улучши его: добавь контекст, ограничения, формат и тон. Объясни, что именно ты изменил и почему."

  5. Посмотри, какой улучшенный промпт предложила модель.

  6. Отправь улучшенный промпт и получи новый ответ.

  7. Сравни два результата:
     - насколько точнее второй результат;
     - что изменилось в стиле и структуре;
     - какие элементы из улучшенного промпта ты бы использовал в следующий раз.

  ## Как понять, что всё получилось

  - У тебя есть 2 версии промпта и 2 ответа по одной задаче.
  - Ты видишь, какие конкретные изменения в промпте дали лучший результат.
  - Ты можешь взять паттерны из улучшенного промпта и перенести их в другие задачи.

questions:

- id: q1
  prompt: |
    Что обычно является главной причиной слабого ответа LLM?
  options:
    - "Ограничения модели по языку"
    - "Недостаточно точный или детальный промпт"
    - "Слишком большой объём задачи"
    - "Отсутствие подключения к интернету"
  correctAnswer: 1

- id: q2
  prompt: |
    Зачем давать примеры в промпте?
  options:
    - "Чтобы сделать запрос длиннее"
    - "Чтобы модель понимала нужный стиль и формат ответа"
    - "Чтобы убрать необходимость в ограничениях"
    - "Чтобы ответ был опубликован быстрее"
  correctAnswer: 1

- id: q3
  prompt: |
    Как работает техника "попроси модель подумать сначала"?
  options:
    - "Модель начинает думать только после второго запроса"
    - "Модель получает задание сначала разобрать условия задачи, а потом дать ответ"
    - "Это просто вежливая форма запроса"
    - "Модель включает режим Fast автоматически"
  correctAnswer: 1

additionalInfo: |
  Паттерны, которые стабильно работают в большинстве задач:

  - **Обзор задачи**: одна фраза о том, что нужно и зачем.
  - **Формат вывода**: таблица, список, связный текст, JSON, и т.д.
  - **Ограничения**: что нельзя, какой лимит по длине, какой тон.
  - **Контекст**: кто аудитория, что уже известно, что важно учесть.

  Можно собрать личную "библиотеку промптов" под повторяемые задачи: шаблоны с заполнителями [такими], куда подставляешь конкретные данные. Это резко сокращает время подготовки запроса и повышает воспроизводимость результата.
