id: 9-4d-framework-ai-fluency
slug: 9-4d-framework-ai-fluency
order: 9
title: "4D: как работать с LLM осознанно"

whyItMatters: |
  Если использовать LLM по схеме 4D, ты перестаешь просто "спрашивать у бота" и начинаешь управлять процессом: что делаем сами, что отдаем модели, как проверяем результат и как не накосячить с этикой и фактами.

theory: |
  4D Framework (фреймворк 4D) — это простой способ работать с AI по шагам, а не хаотично. Его предложили преподаватели Рик Дейкен (Ringling College of Art and Design) и Джозеф Феллер (University College Cork).

  Вот 4 навыка простыми словами:
  - **Delegation (делегирование):** реши, что делает человек, а что делает LLM.
  - **Description (описание):** чётко скажи, какой результат тебе нужен и в каком формате.
  - **Discernment (критическая оценка):** проверь ответ: факты, логику, полезность, уместность.
  - **Diligence (ответственность):** используй AI этично: не скрывай, где помогла модель, и отвечай за финальный результат сам.

  Пример простого prompt:
  "Сделай черновик письма клиенту на 120-150 слов, дружелюбный тон, без канцелярита. В конце дай список фактов, которые нужно проверить вручную."

practice: |
  ## Задание

  Возьми одну реальную задачу из жизни: письмо клиенту, план поездки, описание услуги или пост для соцсетей.

  1. Запиши задачу в 1-2 предложениях.
  2. Пройди шаг **Delegation**: напиши, что делает LLM, а что проверяешь и правишь ты.
  3. Пройди шаг **Description**: отправь LLM точный запрос с форматом результата (объём, стиль, структура).
  4. Пройди шаг **Discernment**: оцени ответ по трём пунктам:
     - есть ли фактические риски;
     - понятно ли написано;
     - подходит ли под твою цель.
  5. Пройди шаг **Diligence**: внеси правки и явно отметь, где ответ модели нужно проверить вручную.
  6. Сделай вторую итерацию: попроси LLM улучшить текст по твоим замечаниям.

  ## Как понять, что всё получилось

  - У тебя есть итоговый текст и короткий план, как ты прошёл все 4D.
  - Ты понимаешь, что первый ответ LLM — это черновик, а не финальная версия.
  - Ты явно отделяешь: что сделал AI, а что сделал человек.

questions:

- id: q1
  prompt: |
    Что означает Delegation в 4D-подходе?
  options:
    - "Сразу публиковать первый ответ модели"
    - "Решать, какие части задачи делает человек, а какие LLM"
    - "Полностью отключить проверку фактов"
    - "Использовать только английский язык"
  correctAnswer: 1

- id: q2
  prompt: |
    Какой шаг отвечает за проверку качества и ошибок в ответе LLM?
  options:
    - "Description"
    - "Discernment"
    - "Delegation"
    - "Diligence"
  correctAnswer: 1

- id: q3
  prompt: |
    Что ближе всего к Diligence в реальной работе?
  options:
    - "Скрыть, что текст помогла сделать модель"
    - "Оставить как есть, если звучит уверенно"
    - "Взять ответственность за итог и проверить рискованные места"
    - "Всегда копировать ответ без изменений"
  correctAnswer: 2

additionalInfo: |
  4D — это не про "идеальный промпт с первого раза", а про рабочий цикл. Обычно лучшее качество получается за 2-3 итерации: запрос, проверка, доработка.
