    - "Система работает только в офлайне"
  correctAnswer: 0

- id: q2
  prompt: |
    Почему недетерминизм LLM может быть проблемой в HR-скоринге?
  options:
    - "Потому что резюме нельзя анализировать текстом"
    - "Потому что одна и та же кандидатура может получать разные баллы"
    - "Потому что LLM не умеют работать с числами"
    - "Потому что LLM всегда ставят 10/10"
