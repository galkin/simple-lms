- id: q3
  prompt: |
    Какой подход повышает устойчивость результата в критичных задачах?
  options:
    - "Опираться на первый ответ и не перепроверять"
    - "Повысить креативность и убрать ограничения"
    - "Использовать несколько прогонов, фиксированную рубрику и ручную проверку"
    - "Скрыть критерии оценки от команды"
  correctAnswer: 2

additionalInfo: |
  ## Занимательные факты о параметрах генерации

  - **Temperature** управляет "смелостью" выбора токена. Ниже значение -> обычно более предсказуемые ответы; выше значение -> больше вариативности.
  - **Top-p (nucleus sampling)** ограничивает выбор токенов "ядром" самых вероятных вариантов. Меньше top-p -> меньше случайности.
  - **Top-k** (если доступен) ограничивает выбор фиксированным числом наиболее вероятных токенов.
  - **Seed** (если поддерживается) может повысить воспроизводимость между запусками, но не во всех продуктах доступен пользователю.
  - **Max output tokens** влияет на длину ответа: короткий лимит иногда обрывает аргументацию и меняет итоговую формулировку.
  - Даже при низкой temperature итог иногда остается не полностью стабильным из-за системных инструкций, контекста диалога и особенностей конкретной платформы.

  Практический ориентир:
  - креативные задачи: temperature выше;
  - аналитика и формализация: temperature ниже + явная рубрика + несколько прогонов.
