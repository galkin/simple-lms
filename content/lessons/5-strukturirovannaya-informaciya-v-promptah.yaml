id: 5-strukturirovannaya-informaciya-v-promptah
slug: 5-strukturirovannaya-informaciya-v-promptah
order: 5
title: "Структурированная информация в промптах"

whyItMatters: |
  Когда в промпте много контекста, модель может смешивать инструкции и данные. Из-за этого теряются условия, появляются ошибки в выводах и падает предсказуемость ответа. Четкая структура с тегами помогает модели понимать, где правила, где входные данные, а где задача.

theory: |
  ## Почему структура важна

  Представь задачу: нужно проанализировать 20 страниц отчётов о продажах.
  Если просто вставить всё одним блоком текста, модель может путать:
  - твои инструкции;
  - сами данные;
  - дополнительные комментарии.

  Если обернуть данные в явные границы, например `<sales_records>...</sales_records>`, модель лучше понимает, что это именно входные данные для анализа, а не команда к действию.

  ## Именование тегов: чем конкретнее, тем лучше

  Не обязательно использовать "официальные" XML-теги. Можно создавать свои, но с понятными именами.

  Хорошо:
  - `<sales_records>` вместо `<data>`
  - `<athlete_information>` для профиля спортсмена
  - `<my_code>` и `<docs>` для разделения кода и документации

  Плохая практика — слишком общие названия (`<info>`, `<content>`, `<block>`), из которых неясно назначение секции.

  ## Когда теги особенно полезны

  Используй структурные теги, когда:
  - даёшь большой объём контекста;
  - смешиваешь разные типы контента (код, документация, данные, требования);
  - вставляешь несколько переменных или блоков данных;
  - хочешь явно разделить "что анализировать" и "что сделать".

  Даже в коротких промптах теги работают как визуальные разделители и делают задачу прозрачнее для модели.

  ## Реальный шаблон

  ```
  <athlete_information>
  - Height: 6'2"
  - Weight: 180 lbs
  - Goal: Build muscle
  - Dietary restrictions: Vegetarian
  </athlete_information>

  Составь план питания на основе информации о спортсмене выше.
  ```

  Здесь модели ясно, что рост, вес, цель и ограничения — одна связанная группа данных, которую нужно учитывать вместе.

  ## Главная идея

  На простых запросах разница может быть умеренной. Но чем сложнее промпт и разнообразнее контекст, тем больше выигрыша от структуры и явных границ секций.

practice: |
  ## Задание: переписать неструктурированный промпт в структурированный

  Цель: увидеть, как структура с тегами повышает качество и управляемость ответа.

  1. Выбери рабочую задачу, где ты обычно даёшь много контекста.
     Примеры: анализ отчёта, ревью кода по требованиям, генерация текста по брифу.

  2. Напиши **версию А** промпта без структуры: просто одним текстом с инструкциями и данными вперемешку.

  3. Отправь версию А в LLM и сохрани результат.

  4. Напиши **версию Б** того же промпта, но структурируй его тегами. Используй минимум 3 секции, например:
     - `<task>` — что нужно сделать;
     - `<context_data>` — входные данные;
     - `<constraints>` — ограничения по формату, стилю, длине.

  5. Отправь версию Б и сохрани результат.

  6. Сравни ответы А и Б по критериям:
     - учтены ли все ограничения;
     - не перепутала ли модель данные и инструкции;
     - насколько точный и полезный итог.

  7. Сделай вывод, какие теги и названия секций ты добавишь в свои шаблоны промптов.

  ## Как понять, что всё получилось

  - У тебя есть одна задача в двух версиях: без структуры и со структурой.
  - Структурированная версия лучше удерживает контекст и ограничения.
  - У тебя появился свой мини-шаблон тегов для повторяемых задач.

questions:

- id: q1
  prompt: |
    Почему теги в промпте помогают модели?
  options:
    - "Потому что модель работает только с XML"
    - "Потому что теги создают явные границы между инструкциями и данными"
    - "Потому что теги автоматически проверяют факты"
    - "Потому что теги ускоряют интернет-поиск"
  correctAnswer: 1

- id: q2
  prompt: |
    Какой вариант имени тега обычно лучше?
  options:
    - "<data>"
    - "<info>"
    - "<sales_records>"
    - "<block>"
  correctAnswer: 2

- id: q3
  prompt: |
    В какой ситуации польза от структурных тегов обычно максимальна?
  options:
    - "Короткий однофразный запрос без контекста"
    - "Сложный промпт с большим объёмом и разными типами контента"
    - "Когда нужно только перевести одно предложение"
    - "Когда у модели отключены инструменты"
  correctAnswer: 1

additionalInfo: |
  Практичный шаблон для сложных задач:

  - `<task>`: конечная цель
  - `<input_data>`: данные для анализа
  - `<constraints>`: ограничения и формат
  - `<output_format>`: как именно должен выглядеть результат

  Если в задаче много переменных, давай им осмысленные названия тегов. Это уменьшает путаницу и повышает воспроизводимость ответа между итерациями.