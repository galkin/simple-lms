id: 7-reasoning-v-llm
slug: 7-reasoning-v-llm
order: 7
title: "Reasoning в LLM: когда включать Thinking"

whyItMatters: |
  Для простых запросов обычно достаточно быстрого ответа. Но в задачах, где важны шаги рассуждения, проверка ограничений и аккуратные выводы, режим Thinking часто дает более надежный результат. Умение выбирать между Fast и Thinking экономит время и снижает риск ошибок.

theory: |
  ## Что такое Reasoning в LLM

  **Reasoning** — это этап, где модель не просто выдает первый вероятный ответ, а проходит через внутреннюю цепочку логических шагов: разбирает условия, проверяет варианты, отсеивает слабые гипотезы и собирает итог.

  На практике это особенно заметно в задачах:
  - с несколькими ограничениями;
  - с вычислениями и проверкой промежуточных шагов;
  - с выбором стратегии, а не только формулировкой текста.

  ## Show Thinking: как смотреть ход рассуждения

  В Gemini для задач с reasoning можно включать режим, в котором показывается, как модель подошла к ответу (Show Thinking).

  Зачем это полезно:
  - видно, где модель могла ошибиться в логике;
  - проще проверить, учла ли модель все условия задачи;
  - легче дать точную обратную связь в следующей итерации.

  Важно: показываемые рассуждения — это инструмент проверки качества, а не гарантия истинности. Финальная проверка фактов и вычислений все равно на тебе.

  ## Fast vs Thinking в Gemini

  Упрощенно:
  - **Fast**: быстрее, дешевле по времени, хорошо для черновиков, перефразирования, простых вопросов.
  - **Thinking**: медленнее, но обычно лучше на сложной логике, многошаговых задачах и анализе с ограничениями.

  Практическое правило:
  - сначала оцени сложность задачи;
  - если есть риск ошибки из-за логики, сразу пробуй Thinking;
  - если задача простая, стартуй с Fast и повышай режим только при необходимости.

practice: |
  ## Задание: сравнить Fast и Thinking на одной задаче

  Цель: увидеть разницу между ответом без углубленного рассуждения и с рассуждением.

  ### Задача

  Ты планируешь мини-воркшоп для 24 участников.

  Условия:
  - Есть 3 формата комнат:
    - A: до 6 человек, стоимость 1200 руб/час;
    - B: до 10 человек, стоимость 1700 руб/час;
    - C: до 14 человек, стоимость 2200 руб/час.
  - Нужно рассадить всех 24 участников.
  - Нельзя превышать лимит вместимости комнат.
  - Нужно минимизировать стоимость за 1 час.
  - Если есть несколько вариантов с одинаковой ценой, выбери вариант с меньшим числом комнат.

  ### Шаги

  1. В Gemini выбери **Fast** режим.
  2. Отправь задачу и попроси: "Дай только финальный ответ и короткое объяснение".
  3. Сохрани результат.
  4. Переключись на **Thinking** режим.
  5. Отправь ту же задачу и включи **Show Thinking**.
  6. Сохрани результат и ход рассуждения.
  7. Сравни два ответа по критериям:
     - правильность (все ограничения соблюдены);
     - итоговая стоимость;
     - прозрачность логики (понятно, почему выбран вариант);
     - уверенность в результате после проверки.

  ## Как понять, что всё получилось

  - У тебя есть два ответа на одну задачу: Fast и Thinking.
  - Ты видишь, есть ли разница в качестве и проверяемости результата.
  - Ты можешь сформулировать правило, когда лично тебе лучше использовать Thinking.

questions:

- id: q1
  prompt: |
    В какой ситуации режим Thinking обычно полезнее режима Fast?
  options:
    - "Когда нужно быстро перефразировать короткий текст"
    - "Когда задача многошаговая и важна логическая проверка"
    - "Когда нужно сгенерировать 3 варианта заголовка"
    - "Когда вопрос не требует анализа"
  correctAnswer: 1

- id: q2
  prompt: |
    Зачем включать Show Thinking при сложной задаче?
  options:
    - "Чтобы ответ стал обязательно короче"
    - "Чтобы увидеть логику решения и проверить, учтены ли ограничения"
    - "Чтобы полностью убрать необходимость проверки"
    - "Чтобы модель всегда давала один и тот же результат"
  correctAnswer: 1

- id: q3
  prompt: |
    Какой практичный подход к выбору режима в Gemini?
  options:
    - "Всегда использовать только Fast"
    - "Всегда использовать только Thinking"
    - "Выбирать режим под сложность задачи и риск ошибки"
    - "Выбирать режим случайно"
  correctAnswer: 2

additionalInfo: |
  Полезная техника для сложных задач: сначала попроси модель явно перечислить ограничения задачи, а потом решить ее. Это снижает риск, что часть условий потеряется в ходе рассуждения.

  Для быстрых рабочих циклов можно использовать стратегию "Fast -> Thinking":
  1) набросать черновой ответ в Fast;
  2) проверить и усилить логику в Thinking;
  3) зафиксировать финальный вариант после ручной валидации.
