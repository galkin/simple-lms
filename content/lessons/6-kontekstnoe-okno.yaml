id: 6-kontekstnoe-okno
slug: 6-kontekstnoe-okno
order: 6
title: "Контекстное окно: что в него влезает и где оно ломается"

whyItMatters: |
  Объем контекстного окна часто кажется техническим параметром "для разработчиков". На деле он влияет на каждого, кто работает в длинных чатах, загружает документы или автоматизирует задачи: важная часть контекста может незаметно исчезнуть из поля зрения модели.

theory: |
  ## Что такое контекстное окно

  **Контекстное окно** — это суммарный объём текста (в токенах), который модель обрабатывает за один раз. Токен — примерно слово или часть слова; обычно 1000 токенов ≈ 700-800 слов.

  Всё, что модель "видит" при генерации ответа, находится именно здесь:

  - системный промпт (скрытые инструкции модели);
  - вся история переписки в чате;
  - определения инструментов (если включены плагины/функции);
  - результаты вызовов инструментов.

  Иными словами: всё, что написано в чате с самого начала, накапливается и занимает место. У каждой модели есть лимит. Когда он достигнут, что-то начинает выпадать или обрезаться.

  ## Три проблемы, которые возникают на практике

  ### 1. Эффект "потерялось в середине"

  Модели стабильно обрабатывают информацию в начале и в конце длинного контекста. Детали в середине — хуже.

  Это значит: если ты вставляешь важное условие или уточнение в середину длинного диалога или документа, модель может его "не заметить".

  **Как снижать риск**: помещай ключевые факты, ограничения и инструкции ближе к началу или к концу запроса. В длинном чате периодически повторяй критичные детали явно.

  ### 2. Накопление результатов инструментов

  Когда к модели подключены инструменты (поиск, код, API), каждый вызов добавляет результат прямо в контекст.

  Если инструмент возвращает объект с 40 полями, а нужны только 5, то 35 полей занимают место в контексте впустую. В длинных сессиях эти "отходы" накапливаются и вытесняют нужную информацию.

  **Как снижать риск**: запрашивай только нужные данные, фильтруй результаты до вставки в контекст, начинай новый чат, когда задача завершена.

  ### 3. Потеря точности при сжатии истории

  Некоторые системы автоматически сжимают (суммаризируют) старую часть диалога, чтобы освободить место. При этом конкретные числа, даты и проценты превращаются в размытые "около", "примерно", "несколько".

  Если последующий ответ опирается на такое сжатое описание, точность теряется незаметно для пользователя.

  **Как снижать риск**: если в задаче важны конкретные числа — фиксируй их явно в текущем сообщении, а не рассчитывай, что модель вспомнит их из старой части чата.

practice: |
  ## Задание: проверить эффект "потерялось в середине"

  Цель: убедиться на практике, что размещение ключевой информации влияет на качество ответа.

  1. Подготовь длинный текст: скопируй любую статью или документ объёмом 1500-2000 слов.

  2. **Вариант А.** Вставь важное условие (например: "Учти, что бюджет не может превышать 50 000 рублей") в самую середину текста, окружи его несвязным текстом с обоих сторон.
     Отправь в Gemini запрос: "Прочитай этот материал и составь план действий с учётом всех ограничений."
     Зафиксируй, упомянул ли LLM бюджетное ограничение.

  3. **Вариант Б.** Перенеси то же условие в самое начало или в конец текста.
     Отправь в новом чате идентичный запрос.
     Зафиксируй, упомянул ли LLM бюджетное ограничение на этот раз.

  4. Сравни результаты:
     - в каком варианте ограничение было учтено;
     - насколько уверенно и точно оно отражено в ответе.

  5. Сформулируй вывод: как ты будешь структурировать длинные запросы в будущем.

  ## Как понять, что всё получилось

  - Ты видел реальную разницу в двух ответах на одинаковый запрос.
  - Ты понимаешь, почему важно помещать ключевые детали в начало или конец контекста.
  - Ты можешь применить этот принцип к своим рабочим задачам: документам, длинным чатам, загрузке файлов.

questions:

- id: q1
  prompt: |
    Что входит в контекстное окно модели?
  options:
    - "Только последнее сообщение пользователя"
    - "Системный промпт, история диалога, инструменты и их результаты"
    - "Только файлы, загруженные в чат"
    - "Только системный промпт и текущий вопрос"
  correctAnswer: 1

- id: q2
  prompt: |
    В чём суть эффекта "потерялось в середине"?
  options:
    - "Модель забывает первое сообщение в любом чате"
    - "Модель лучше обрабатывает начало и конец контекста, детали в середине часто теряются"
    - "Чат автоматически очищается после 10 сообщений"
    - "Модель путает порядок сообщений в длинном чате"
  correctAnswer: 1

- id: q3
  prompt: |
    Почему важные числа и даты могут исчезнуть при автоматическом сжатии истории чата?
  options:
    - "Числа не поддерживаются моделью"
    - "При суммаризации конкретные значения часто заменяются на размытые формулировки вроде 'около'"
    - "Чат удаляет все числа из соображений приватности"
    - "Числа занимают слишком много токенов"
  correctAnswer: 1

additionalInfo: |
  Несколько практичных привычек в работе с длинными чатами:

  - **Начинай чат с явным контекстом**: важные факты, ограничения и цель задачи — в первом сообщении.
  - **Закрывай чаты по задачам**: не тяни один чат на несколько несвязанных задач — контекст "замусоривается" и модель теряет фокус.
  - **Повторяй критичные числа**: если число важно для вывода — назови его снова в финальном запросе, не рассчитывай на память чата.
  - **Фиксируй результаты вне чата**: итоги итерации удобнее хранить в документе, а не поднимать из старой переписки.
