id: 11-zachem-nuzhny-evals
slug: 11-zachem-nuzhny-evals
order: 11
title: "Зачем нужны evals в работе с LLM"

whyItMatters: |
  Простые проверочные прогоны помогают понять, где Gemini реально экономит время, где ему не хватает контекста, и где нужен обязательный контроль человека перед финальным результатом.

theory: |
  ## Как будем называть evals

  В этом курсе вместо слова evals используем термин **проверочные прогоны**.
  Это короткие практические проверки качества: ты даешь LLM типовую задачу и смотришь, насколько ответ реально годится в работу.

  ## Зачем это нужно

  Твоя работа уникальна. LLM может отлично справляться с одним типом задач и заметно хуже с другим. Проверочные прогоны помогают увидеть это на реальных примерах, а не на ощущениях.

  Они особенно полезны для **повторяемых задач**: посты в соцсети, еженедельные отчеты, описания товаров, ответы по шаблонным вопросам. После нескольких прогонов ты начинаешь лучше понимать сильные и слабые стороны модели именно в твоем процессе.

  ## Почему это регулярная задача

  AI-вендоры регулярно выпускают новые модели и обновления, часто раз в квартал. После обновлений стиль, точность и поведение модели могут меняться. Поэтому для power users (продвинутых пользователей) проверочные прогоны - это не разовая акция, а рабочая рутина.

  Пример простого prompt:
  "Сделай пост для соцсетей о запуске нового продукта, 600-800 знаков, живой и понятный стиль, без кликбейта. В конце дай 3 факта, которые нужно проверить вручную."

practice: |
  ## Задание

  Цель: собрать мини проверочный прогон для одной повторяющейся задачи с постами для соцсетей.

  1. Выбери одну тему для постов в соцсетях, которую ты публикуешь регулярно.
    Примеры: анонсы продуктов, полезные советы, кейсы клиентов, новости команды.
  2. Собери 5-10 своих реальных постов на эту тему.
  3. Напиши 2-3 prompt, которые должны дать похожий результат.
     Включи контекст, который ты обычно знаешь в работе.
  4. Запусти эти prompt в Gemini или другой LLM.
  5. Сравни ответы модели со своими постами по трем пунктам:
     - переданы ли ключевые факты;
     - подходит ли тон и стиль;
     - что пропущено или нужно улучшить.
  6. Сделай вторую итерацию: улучши prompt.
     Добавь конкретные ограничения, формат ответа и 1-2 эталонных примера.
  7. Зафиксируй итог: какие посты LLM может делать как сильный черновик, а где нужен обязательный ручной контроль перед публикацией.

  ## Как понять, что всё получилось

  - У тебя есть набор примеров, тестовые prompt и критерии сравнения.
  - Ты видишь, какие формулировки prompt дают лучший результат именно для твоей задачи.
  - У тебя есть понятное правило: что можно делегировать LLM, а что всегда проверяет человек.

questions:

- id: q1
  prompt: |
    Зачем в работе с LLM делать простые evals?
  options:
    - "Чтобы всегда получать идеальный ответ с первого раза"
    - "Чтобы понять, где модель полезна, а где нужен дополнительный контроль"
    - "Чтобы полностью убрать человека из процесса"
    - "Чтобы писать только длинные prompt"
  correctAnswer: 1

- id: q2
  prompt: |
    Какой минимальный практичный набор для старта mini-eval?
  options:
    - "Один случайный запрос без сравнения"
    - "5-10 реальных примеров задачи и сравнение по понятным критериям"
    - "Только теория без практики"
    - "Только проверка орфографии"
  correctAnswer: 1

- id: q3
  prompt: |
    Что делать после первого сравнения ответов LLM с твоими примерами?
  options:
    - "Оставить всё как есть и не менять prompt"
    - "Удалить примеры и начать с нуля"
    - "Уточнить prompt, добавить примеры хорошего результата и повторить проверку"
    - "Сразу публиковать результат без проверки"
  correctAnswer: 2

additionalInfo: |
  Для повторяющихся задач удобно создавать постоянные "настройки роли":
  - **Gemini Gems** в Gemini: можно сохранить инструкцию, стиль, формат ответа и контекст под конкретный тип задач (например, "редактор постов для соцсетей").
  - **CustomGPTs** в ChatGPT: похожая идея, когда ты собираешь своего помощника с фиксированными правилами и поведением.

  Это снижает количество ручных правок, потому что ты не начинаешь каждый раз с нуля: базовые требования уже встроены, а ты только даешь входные данные и делаешь финальную проверку. Полезно повторять проверочные прогоны после крупных обновлений модели, чтобы быстро понять, стало лучше или хуже на твоих типовых задачах.