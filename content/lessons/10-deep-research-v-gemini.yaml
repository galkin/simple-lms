id: 10-deep-research-v-gemini
slug: 10-deep-research-v-gemini
order: 10
title: "Deep Research в Gemini"

whyItMatters: |
  Deep Research нужен, когда тебе важен не быстрый ответ, а нормальное исследование с проверяемыми источниками, которое обычно заняло бы у человека несколько часов.

theory: |
  ## Что такое Deep Research

  **Deep Research** в Gemini — это режим, где модель работает как исследователь: не делает один поиск, а запускает серию шагов, уточняет, что проверить дальше, и собирает итоговый отчет из нескольких источников.

  Обычно это занимает 5-15 минут, а сложные темы могут занять дольше. Зато ты получаешь более целостный результат с ссылками, а не короткий ответ "на глаз".

  ## Когда включать Deep Research

  Используй Deep Research, когда нужно:
  - собрать материал из многих источников;
  - сравнить варианты (например, подрядчиков, инструменты, конкурентов);
  - получить структурированный отчет с цитированием источников;
  - разобраться в теме, где важны детали и разные точки зрения.

  Лучше выбрать обычный веб-поиск, когда нужен один быстрый факт. А если внешние данные не нужны и задача чисто логическая, лучше подойдет режим размышления (extended thinking, углубленное рассуждение).

  ## Как это работает по шагам

  1. Модель планирует исследование: что проверить и в каком порядке.
  2. Делает несколько поисковых шагов, а не один запрос.
  3. Собирает и синтезирует найденное в единый отчет.
  4. Добавляет ссылки на источники, чтобы ты мог быстро проверить выводы.

  Пример хорошего prompt:
  "Сделай deep research по рынку онлайн-курсов по ИИ для новичков в СНГ: ключевые игроки, ценовые модели, сильные и слабые стороны, риски для запуска нового курса. Оформи в разделах и добавь ссылки на источники."

practice: |
  ## Задание

  Цель: сделать свой первый практический Deep Research в Gemini.

  1. Выбери тему, где нужен не один факт, а сравнение и выводы.
    Пример для начинающего соло-автора в соцсетях: "тренды форматов контента на ближайшие 6 месяцев: короткие видео, карусели, текстовые посты, прямые эфиры".
  2. Включи Deep Research в интерфейсе Gemini.
  3. Отправь структурный запрос:
    "Сделай исследование трендов развития типов контента в соцсетях для начинающего соло-автора. Нужны разделы: какие форматы растут, для каких целей они подходят, плюсы и риски каждого формата, и простой контент-план на 2 недели. Добавь ссылки на источники."
  4. Дождись отчета и проверь ссылки:
     - открой минимум 3 источника;
     - проверь, что выводы в отчете соответствуют источникам.
  5. Попроси Gemini оформить результат в Google Doc, а затем скачай документ как PDF.
    Пример запроса: "Сохрани этот отчет как Google Doc со структурой заголовков и таблицей по форматам контента."

  ## Как понять, что всё получилось

  - У тебя есть структурированный отчет, а не просто общий текст.
  - В отчете есть ссылки, и ты проверил минимум 3 из них.
  - У тебя есть финальный документ в Google Docs и экспорт в PDF.

questions:

- id: q1
  prompt: |
    Чем Deep Research отличается от обычного быстрого запроса к LLM?
  options:
    - "Ничем, это одно и то же"
    - "Deep Research обычно делает много шагов поиска и собирает отчет из нескольких источников"
    - "Deep Research работает только без интернета"
    - "Deep Research всегда отвечает в одну строку"
  correctAnswer: 1

- id: q2
  prompt: |
    В какой ситуации Deep Research обычно уместнее обычного веб-поиска?
  options:
    - "Когда нужен один короткий факт прямо сейчас"
    - "Когда нужна сравнительная аналитика по нескольким источникам"
    - "Когда надо просто проверить орфографию"
    - "Когда не важно качество вывода"
  correctAnswer: 1

- id: q3
  prompt: |
    Зачем в Deep Research нужны ссылки на источники?
  options:
    - "Чтобы текст выглядел длиннее"
    - "Чтобы можно было проверить выводы и углубиться в детали"
    - "Чтобы не читать сам отчет"
    - "Чтобы модель работала быстрее"
  correctAnswer: 1

additionalInfo: |
  Deep Research есть не только в Gemini, но и в других системах. Для практики полезно прогнать похожий запрос минимум в двух инструментах и сравнить: глубину анализа, структуру и качество ссылок.

  Попробуй это же задание в ChatGPT и в NotebookLM. Так ты быстрее поймешь, какой инструмент лучше подходит именно под твой стиль работы и тип задач.